<script>
    // Interaction for OTP inputs
    const inputs = document.querySelectorAll('.otp-input');
    
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // Add slight tactile movement to maintenance banner on interaction
    const banner = document.querySelector('.bg-secondary-container');
    banner.addEventListener('mousedown', () => {
      banner.style.transform = 'translateY(2px)';
      banner.style.borderBottomWidth = '2px';
    });
    banner.addEventListener('mouseup', () => {
      banner.style.transform = 'translateY(0)';
      banner.style.borderBottomWidth = '4px';
    });
  </script>
