<style>
        .candy-button {
            position: relative;
            transition: transform 0.1s ease, background-color 0.2s ease;
            box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.2);
        }
        .candy-button-primary {
            background-color: #1cb0f6;
            box-shadow: 0 4px 0 0 #0090d3;
        }
        .candy-button:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.2);
        }
        .candy-button-primary:hover {
            box-shadow: 0 2px 0 0 #0090d3;
        }
        .candy-button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 transparent;
        }

        .candy-card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 7px 0 0 #e0e3e5;
            transition: border-color 0.2s ease;
        }
        .candy-card:focus-within {
            border: 2px solid #006590;
        }

        .input-candy {
            border: 2px solid #bdc8d2;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            transition: all 0.2s ease;
        }
        .input-candy:focus {
            outline: none;
            border-color: #006590;
            box-shadow: 0 0 0 4px rgba(0, 101, 144, 0.1);

</div>
</div>
</header>

                        Mr. K and the flock have missed you. Let's get back to your financial goals!
                    </p>

<!-- Login Form Column -->

</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2 text-center lg:text-left">Log In</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 text-center lg:text-left">Access your pocket and join the flock.</p>
<form class="space-y-6" onsubmit="return false;">
<!-- Identity Field -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">Email, phone, or username</label>
<input class="w-full input-candy font-body-md text-body-md bg-surface-container-lowest" placeholder="Enter your identity" type="text">
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-bold text-label-bold text-on-surface-variant">Password</label>
<a class="text-primary font-label-bold text-label-bold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full input-candy font-body-md text-body-md bg-surface-container-lowest pr-12" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Remember & Options -->
<div class="flex items-center gap-3 px-1">
<input class="w-6 h-6 rounded-lg border-2 border-outline-variant text-primary focus:ring-primary cursor-pointer" id="remember" type="checkbox">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me</label>
</div>
<!-- Primary Login Button -->
<button class="w-full candy-button candy-button-primary py-4 rounded-2xl text-on-primary font-display text-headline-md flex items-center justify-center gap-2">
<span>Log in</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Social Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-grow h-px bg-outline-variant"></div>
<span class="font-label-bold text-label-bold text-outline-variant">OR</span>
<div class="flex-grow h-px bg-outline-variant"></div>
</div>
<!-- Social Buttons -->

<span class="font-label-bold text-label-bold">Google</span>

<footer class="w-full bottom-0 bg-transparent py-8 text-center">
<div class="flex flex-col md:flex-row justify-center items-center gap-6 w-full max-w-container-max mx-auto px-margin-mobile">
<span class="font-body-md text-body-md text-on-surface-variant">© 2024 KeenPocket. Join the flock.</span>
<div class="flex gap-4">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors cursor-pointer" href="#">Privacy</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors cursor-pointer" href="#">Terms</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors cursor-pointer" href="#">Support</a>
</div>
</div>
</footer>
<script>
        // Micro-interaction for input focus
        document.querySelectorAll('.input-candy').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });

        // Toggle password visibility
        const visibilityBtn = document.querySelector('[data-icon="visibility"]');
        const passwordInput = document.querySelector('input[type="password"]');
        if (visibilityBtn && passwordInput) {
            visibilityBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                visibilityBtn.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
