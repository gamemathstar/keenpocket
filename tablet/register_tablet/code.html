<!DOCTYPE html><html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .candy-button-shadow {
            box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
        }
        .candy-button-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.2);
        }

        .candy-card-shadow {
            box-shadow: 0 7px 0 0 #e0e3e5;
        }

        .soft-glow {
            box-shadow: 0 25px 50px -12px rgba(0, 101, 144, 0.1);
        }
        
        /* Specific bottom border for primary candy button */
        .primary-candy {
            border-bottom: 4px solid #004c6e;
        }
        .primary-candy:active {
            border-bottom: 0px solid transparent;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center justify-center p-6">
<!-- Top Navigation Placeholder (Hidden for Transactional Screen as per Shell Visibility Rule) -->
<header class="w-full top-0 bg-background dark:bg-background flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto absolute">
<div class="font-display text-headline-lg text-primary dark:text-primary-fixed-dim tracking-tight">KeenPocket</div>
<button class="text-on-surface-variant material-symbols-outlined hover:opacity-80 transition-opacity">help</button>
</header>
<main class="w-full max-w-2xl mt-20 mb-12 flex flex-col items-center">
<!-- Mascot Section -->
<div class="mb-8 transform transition-transform hover:scale-105 duration-300 cursor-pointer">
<img alt="Mr. K Mascot" class="w-64 h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp7lXKC8U7rTsRc5ygI4YTGbU7bz3iQR6qbQTMDjivU5FXlgp69RMXsvaflfUNKpHoK1ev831UTS6hVAiJ31nYGCP7hWeQb3EqqgYLRDE1mqFjmn8qTsX_4kxhZ8QXswCPt6XWlrorvA7mmqNk0mpPvhM8xX_chT5_xLn9D64ANgO3DK64Mi6a_z55PNSawW6Qagngg926WUO3nQJfddojFFdNdZe-Jjda_0BMq0_Zyyc1jv5Z6UFI9PWVqMSG7TKWbQdZeCa-ei0">
</div>
<!-- Registration Card -->
<div class="w-full bg-surface-container-lowest rounded-[1.5rem] p-8 md:p-12 candy-card-shadow soft-glow">
<div class="text-center mb-8">
<h1 class="font-display text-display text-primary mb-2">Create Account</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Ready to join the flock? Let's get started!</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Full name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-outline-variant rounded-xl focus:border-primary focus:ring-0 transition-colors outline-none font-body-md text-on-surface" placeholder="Alex Taylor" type="text">
</div>
</div>
<!-- Email (Error State) -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-error">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-error rounded-xl focus:ring-0 transition-colors outline-none font-body-md text-error" type="email" value="alex@pocket.com">
</div>
<p class="text-error font-label-bold text-label-bold px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">error</span>
                        Email already in use
                    </p>
</div>
<!-- Phone Number -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Phone number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">phone</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-outline-variant rounded-xl focus:border-primary focus:ring-0 transition-colors outline-none font-body-md text-on-surface" placeholder="+1 (555) 000-0000" type="tel">
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Password -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-outline-variant rounded-xl focus:border-primary focus:ring-0 transition-colors outline-none font-body-md text-on-surface" placeholder="••••••••" type="password">
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Confirm password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock_reset</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-outline-variant rounded-xl focus:border-primary focus:ring-0 transition-colors outline-none font-body-md text-on-surface" placeholder="••••••••" type="password">
</div>
</div>
</div>
<!-- Terms -->
<label class="flex items-center gap-3 cursor-pointer group mt-2">
<div class="relative flex items-center">
<input class="peer h-6 w-6 border-2 border-outline-variant rounded-lg checked:bg-primary checked:border-primary focus:ring-0 transition-all cursor-pointer" type="checkbox">
<span class="material-symbols-outlined absolute text-white scale-0 peer-checked:scale-100 transition-transform left-1/2 -translate-x-1/2 text-[18px]">check</span>
</div>
<span class="font-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">
                        I agree to the <a class="text-primary font-label-bold hover:underline" href="#">Terms of Service</a> and Privacy Policy.
                    </span>
</label>
<!-- Create Account Button -->
<button class="w-full bg-primary-container text-white py-4 rounded-xl font-headline-md text-headline-md primary-candy candy-button-shadow mt-4" type="submit">
                    Create account
                </button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-label-bold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</main>
<footer class="w-full py-8 text-center mt-auto">
<div class="flex flex-col md:flex-row justify-center items-center gap-4 text-on-surface-variant font-body-md">
<span>© 2024 KeenPocket. Join the flock.</span>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors cursor-pointer" href="#">Privacy</a>
<a class="hover:text-primary transition-colors cursor-pointer" href="#">Terms</a>
<a class="hover:text-primary transition-colors cursor-pointer" href="#">Support</a>
</div>
</div>
</footer>
<script>
        // Simple input interaction effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.style.transition = 'all 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
