<!-- Small script for simple mascot float animation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const mascot = document.querySelector('img[src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp7lXKC8U7rTsRc5ygI4YTGbU7bz3iQR6qbQTMDjivU5FXlgp69RMXsvaflfUNKpHoK1ev831UTS6hVAiJ31nYGCP7hWeQb3EqqgYLRDE1mqFjmn8qTsX_4kxhZ8QXswCPt6XWlrorvA7mmqNk0mpPvhM8xX_chT5_xLn9D64ANgO3DK64Mi6a_z55PNSawW6Qagngg926WUO3nQJfddojFFdNdZe-Jjda_0BMq0_Zyyc1jv5Z6UFI9PWVqMSG7TKWbQdZeCa-ei0"]');
            let angle = 0;
            
            function animate() {
                angle += 0.02;
                const yOffset = Math.sin(angle) * 10;
                mascot.style.transform = `translateY(${yOffset}px)`;
                requestAnimationFrame(animate);
            }
            
            animate();
        });
    </script>
