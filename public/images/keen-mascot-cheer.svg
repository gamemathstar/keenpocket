<svg width="440" height="520" viewBox="0 0 440 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="K the Wise Contributor cheering">
  <defs>
    <radialGradient id="head3" cx="38%" cy="30%" r="78%">
      <stop offset="0" stop-color="#F3C78E"/><stop offset="0.55" stop-color="#D18B49"/><stop offset="1" stop-color="#A35E29"/>
    </radialGradient>
    <radialGradient id="limb3" cx="35%" cy="30%" r="80%">
      <stop offset="0" stop-color="#DC924F"/><stop offset="1" stop-color="#A35E29"/>
    </radialGradient>
    <radialGradient id="robe3" cx="40%" cy="26%" r="85%">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E6ECF2"/>
    </radialGradient>
    <radialGradient id="gold3" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#FFEFAE"/><stop offset="0.6" stop-color="#F3C24C"/><stop offset="1" stop-color="#D7991C"/>
    </radialGradient>
    <radialGradient id="leaf3" cx="35%" cy="28%" r="85%">
      <stop offset="0" stop-color="#84CF86"/><stop offset="1" stop-color="#3C8E4C"/>
    </radialGradient>
  </defs>

  <ellipse cx="220" cy="500" rx="104" ry="14" fill="#000000" opacity="0.08"/>

  <!-- sparkles -->
  <g fill="#FBC34A">
    <path d="M70 70 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M372 78 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
    <circle cx="58" cy="150" r="4"/><circle cx="386" cy="160" r="4"/>
  </g>

  <!-- leafy backpack -->
  <g stroke="#2E7D3E" stroke-width="2">
    <g transform="translate(124,178) rotate(-32) scale(1.7)"><path d="M0,-13 Q15,0 0,13 Q-15,0 0,-13Z" fill="url(#leaf3)"/><path d="M0,-11 L0,11" stroke="#2E7D3E"/></g>
    <g transform="translate(112,224) rotate(-8) scale(1.6)"><path d="M0,-13 Q15,0 0,13 Q-15,0 0,-13Z" fill="url(#leaf3)"/><path d="M0,-11 L0,11"/></g>
    <g transform="translate(316,178) rotate(32) scale(1.7)"><path d="M0,-13 Q15,0 0,13 Q-15,0 0,-13Z" fill="url(#leaf3)"/><path d="M0,-11 L0,11"/></g>
    <g transform="translate(328,224) rotate(8) scale(1.6)"><path d="M0,-13 Q15,0 0,13 Q-15,0 0,-13Z" fill="url(#leaf3)"/><path d="M0,-11 L0,11"/></g>
  </g>

  <!-- feet -->
  <ellipse cx="190" cy="478" rx="22" ry="12" fill="url(#limb3)"/>
  <ellipse cx="250" cy="478" rx="22" ry="12" fill="url(#limb3)"/>

  <!-- body / thobe -->
  <path d="M176 312 Q172 300 188 300 L252 300 Q268 300 264 312 L300 452 Q304 474 282 474 L158 474 Q136 474 140 452 Z" fill="url(#robe3)" stroke="#E2E8EE" stroke-width="2"/>
  <path d="M200 306 L220 296 L240 306 L231 324 L220 316 L209 324 Z" fill="#FFFFFF" stroke="#E2E8EE" stroke-width="2"/>
  <path d="M186 304 Q200 340 214 360" stroke="#3F9A4F" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M254 304 Q240 340 226 360" stroke="#357F42" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- chain + glossy medallion -->
  <path d="M204 312 Q220 344 220 360" stroke="#E0A020" stroke-width="4" fill="none"/>
  <path d="M236 312 Q220 344 220 360" stroke="#E0A020" stroke-width="4" fill="none"/>
  <circle cx="220" cy="378" r="35" fill="url(#gold3)" stroke="#B9831A" stroke-width="3"/>
  <circle cx="220" cy="378" r="27" fill="none" stroke="#C98A1A" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="208" cy="366" rx="13" ry="8" fill="#FFFFFF" opacity="0.4"/>
  <g stroke="#8A5A12" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M211 362 V394"/><path d="M211 378 L231 362"/><path d="M217 379 L233 394"/>
  </g>

  <!-- both arms raised -->
  <path d="M174 330 Q130 296 120 248" stroke="url(#limb3)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <circle cx="118" cy="240" r="19" fill="url(#limb3)"/>
  <path d="M266 330 Q310 296 320 248" stroke="url(#limb3)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <circle cx="322" cy="240" r="19" fill="url(#limb3)"/>

  <!-- antennae -->
  <g stroke="url(#limb3)" stroke-width="12" stroke-linecap="round" fill="none">
    <path d="M188 92 C172 56 152 50 150 40"/>
    <path d="M252 92 C268 56 288 50 290 40"/>
  </g>
  <circle cx="150" cy="38" r="11" fill="url(#head3)"/>
  <circle cx="290" cy="38" r="11" fill="url(#head3)"/>

  <!-- head -->
  <ellipse cx="220" cy="172" rx="106" ry="98" fill="url(#head3)"/>
  <ellipse cx="184" cy="126" rx="48" ry="34" fill="#FFFFFF" opacity="0.20"/>

  <ellipse cx="146" cy="200" rx="22" ry="15" fill="#F2967A" opacity="0.55"/>
  <ellipse cx="294" cy="200" rx="22" ry="15" fill="#F2967A" opacity="0.55"/>

  <!-- happy closed-arc eyes (^_^) for extra cheer -->
  <g stroke="#3A2412" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M158 174 Q182 150 206 174"/>
    <path d="M234 174 Q258 150 282 174"/>
  </g>

  <!-- big open smile -->
  <path d="M188 206 Q220 250 252 206 Q220 230 188 206 Z" fill="#7A3A1C"/>
  <path d="M204 222 Q220 232 236 222" fill="#E07A6A"/>
</svg>
