<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KeenPocket">
  <defs>
    <linearGradient id="kpBg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37BBF8"/>
      <stop offset="1" stop-color="#1899D6"/>
    </linearGradient>
    <linearGradient id="kpCoin" x1="190" y1="110" x2="330" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD75E"/>
      <stop offset="1" stop-color="#FBB540"/>
    </linearGradient>
  </defs>

  <!-- App-icon background (rounded square, blue gradient) -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#kpBg)"/>
  <!-- Soft top highlight -->
  <ellipse cx="196" cy="116" rx="226" ry="122" fill="#FFFFFF" opacity="0.10"/>

  <!-- Chunky 3D bottom edge of the pocket (deeper blue, peeks below the front) -->
  <rect x="100" y="242" width="312" height="190" rx="52" fill="#1175B4"/>

  <!-- Coin tucking into the pocket -->
  <circle cx="256" cy="196" r="92" fill="url(#kpCoin)"/>
  <circle cx="256" cy="196" r="74" fill="none" stroke="#EE9F2E" stroke-width="9" opacity="0.85"/>
  <ellipse cx="220" cy="150" rx="20" ry="12" fill="#FFFFFF" opacity="0.55"/>
  <!-- "K" monogram on the coin -->
  <g stroke="#1899D6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M228 156 V216"/>
    <path d="M228 189 L286 156"/>
    <path d="M244 190 L290 216"/>
  </g>

  <!-- Front of the pocket (white) — covers the lower part of the coin -->
  <rect x="100" y="224" width="312" height="190" rx="52" fill="#FFFFFF"/>
  <!-- Pocket seam / stitch line -->
  <rect x="142" y="300" width="228" height="14" rx="7" fill="#CFEBFD"/>
</svg>
